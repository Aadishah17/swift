name: PR Area Labels

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  area-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Apply area labels from changed files
        uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
